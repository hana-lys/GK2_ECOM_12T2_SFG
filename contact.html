<!DOCTYPE html>
<html lang="vi">
<head>

    <title>SWEETLAB - Contact Us</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="index.html">
                <img src="img/logo.png" alt="Logo" width="100" class="logo-img">
            </a>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="blog.html">Blog</a>

            <a href="contact.html">Contact</a>
        </nav>
        <div class="icons header-icons">
            <a href="cart.html" class="cart-link"><span>🛒</span></a>
            <div class="user-wrapper">
                <span id="user-icon">👤</span>
                <div id="user-dropdown">
                    <p class="dropdown-greeting">Hi, User A! 👋</p>
                    <hr class="dropdown-hr">
                    <a href="#" class="dropdown-link">My Profile</a>
                    <a href="#" class="dropdown-link">Order History</a>

    <section class="contact-page">

        <form class="contact-form">
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea placeholder="Your Message" rows="5"></textarea>
            
            <button type="submit" class="btn-submit">Send Message</button>
            
            <a href="index.html" class="back-link">
                ← Quay về trang chủ

        <div class="footer-box"><h3>Quick Links</h3><a href="index.html" class="footer-link">Home</a><br><a href="shop.html" class="footer-link">Shop</a></div>
        <div class="footer-box"><h3>Follow Us</h3><p>Instagram | Facebook</p></div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
